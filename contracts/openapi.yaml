openapi: 3.1.0
info:
  title: Pressure Takeover Agent API
  version: 0.1.0
  description: Contract draft for the six-week multi-device demo.
servers:
  - url: http://localhost:8000
paths:
  /health:
    get:
      operationId: getHealth
      responses:
        '200':
          description: Service is ready.
          content:
            application/json:
              schema:
                type: object
                required: [status]
                properties:
                  status:
                    type: string
                    const: ok
  /v1/events:
    post:
      operationId: submitEvent
      summary: Submit an event from a client or the demo console.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: ./event.schema.json
      responses:
        '202':
          description: Event accepted for processing.
          content:
            application/json:
              schema:
                type: object
                required: [eventId, accepted]
                properties:
                  eventId:
                    type: string
                  accepted:
                    type: boolean
                  revision:
                    type: integer
        '400':
          description: Invalid event payload.
        '409':
          description: Duplicate or already-consumed event/confirmation.
  /v1/world-state:
    get:
      operationId: getWorldState
      summary: Get the latest complete World State snapshot.
      responses:
        '200':
          description: Latest World State.
          content:
            application/json:
              schema:
                $ref: ./world-state.schema.json
  /v1/stream:
    get:
      operationId: streamWorldState
      summary: Stream complete World State snapshots with Server-Sent Events.
      responses:
        '200':
          description: SSE stream. Each data field contains a World State JSON object.
          content:
            text/event-stream:
              schema:
                type: string
